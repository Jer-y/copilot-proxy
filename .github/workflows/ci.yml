name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.19.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint:all

      - name: Run unused code check
        run: bun run knip

      - name: Run dependency audit
        run: bun run audit

      - name: Run type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: Smoke-test a real Node.js HTTP listener
        run: bun run test:node:http

      - name: Smoke-test the minimum supported Node.js runtime
        run: node dist/main.js debug --json

  native-service-adapters:
    name: Native service adapter (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            adapter_test: tests/darwin-autostart.test.ts
          - os: windows-latest
            adapter_test: tests/win32-autostart.test.ts
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.19.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Exercise the native service adapter on its host OS
        run: bun test ${{ matrix.adapter_test }} tests/daemon-enable.test.ts tests/service-install-state.test.ts tests/main-entrypoint.test.ts

      - name: Exercise the Windows development launcher on Windows
        if: runner.os == 'Windows'
        run: bun test tests/start-bat.test.ts tests/shell.test.ts tests/client-setup.test.ts

      - name: Exercise the Windows launcher from a real UNC path
        if: runner.os == 'Windows'
        shell: powershell
        run: ./scripts/run-windows-unc-launcher-test.ps1

  deploy-pages:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [test, native-service-adapters]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout validated revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Stamp Pages artifact revision
        run: printf '%s\n' "$GITHUB_SHA" > pages/deployment-revision.txt

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory ./pages \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Verify deployment still targets main HEAD
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "$GITHUB_SHA" != "$current_main_sha" ]]; then
            echo "::error::Refusing to deploy ${GITHUB_SHA}; current main is ${current_main_sha}."
            exit 1
          fi

      - name: Deploy validated Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Verify public Diagnostics dashboard
        env:
          DASHBOARD_URL: ${{ steps.deployment.outputs.page_url }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          page_file="$RUNNER_TEMP/deployed-dashboard.html"
          revision_file="$RUNNER_TEMP/deployed-dashboard-revision.txt"
          public_url="${DASHBOARD_URL%/}/?deployment=${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          revision_url="${DASHBOARD_URL%/}/deployment-revision.txt?deployment=${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"

          verify_page() {
            grep -Fq '<meta name="copilot-proxy-dashboard-version" content="diagnostics-v1" />' "$page_file" &&
              grep -Fq 'content="diagnostics exact-endpoints redirect-error credentials-omit"' "$page_file" &&
              grep -Fq '<title>Copilot Proxy Diagnostics</title>' "$page_file" &&
              grep -Fq '["/diagnostics", "/diagnostics/", "/usage", "/usage/"]' "$page_file" &&
              grep -Fq 'credentials: "omit"' "$page_file" &&
              grep -Fq 'redirect: "error"' "$page_file"
          }

          for attempt in {1..12}; do
            rm -f "$page_file" "$revision_file"
            if curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --connect-timeout 5 \
              --max-time 15 \
              --header 'Cache-Control: no-cache' \
              --header 'Pragma: no-cache' \
              --output "$page_file" \
              "${public_url}-${attempt}"
            then
              if curl \
                --fail \
                --silent \
                --show-error \
                --location \
                --connect-timeout 5 \
                --max-time 15 \
                --header 'Cache-Control: no-cache' \
                --header 'Pragma: no-cache' \
                --output "$revision_file" \
                "${revision_url}-${attempt}" \
                && verify_page \
                && grep -Fxq "$GITHUB_SHA" "$revision_file"
              then
                latest_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
                if [[ "$GITHUB_SHA" != "$latest_main_sha" ]]; then
                  echo "::error::The public dashboard revision ${GITHUB_SHA} is no longer current main (${latest_main_sha})."
                  exit 1
                fi
                echo "Verified public Diagnostics dashboard at ${DASHBOARD_URL}"
                exit 0
              fi
            fi

            if (( attempt < 12 )); then
              echo "Public dashboard is not current yet (attempt ${attempt}/12); retrying in 5 seconds."
              sleep 5
            fi
          done

          echo "::error::The deployed public dashboard does not contain the required Diagnostics version and security capabilities."
          exit 1
